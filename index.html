<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telecel Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-red-50 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">
    
    <!-- Header -->
    <h1 class="text-2xl font-bold text-red-600 text-center mb-6">
      Telecel Ghana
    </h1>

    <!-- Form -->
    <form class="space-y-4">
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Enter Message
        </label>
        <textarea 
          rows="4"
          placeholder="Type your message here..."
          class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
        ></textarea>
      </div>

      <button 
        type="submit"
        class="w-full bg-red-600 text-white py-3 rounded-lg font-semibold hover:bg-red-700 transition duration-200"
      >
        Submit
      </button>

    </form>

  </div>

</body>
</html>
